name: Build & test
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-22.04, ubuntu-24.04, windows-2022, windows-2025 ]
        framework: [ 'net8.0', 'net9.0' ]
        configuration: [ 'Debug', 'Release' ]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
      - run: dotnet restore
      - run: dotnet build --no-restore --framework ${{ matrix.framework }} --configuration ${{ matrix.configuration }}
      - run: dotnet test --no-build --framework ${{ matrix.framework }} --configuration ${{ matrix.configuration }}
      - uses: actions/upload-artifact@v4
        with:
          path: "./Allure.Examples.CiEnvs.Tests/bin/${{ matrix.configuration }}/${{ matrix.framework }}/allure-results"
          name: "AllureResults-${{ matrix.os }}-${{ matrix.framework }}-${{ matrix.configuration }}"

  generate-report:
    needs: build-test
    runs-on: ubuntu-latest
    if: always()
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Check out Allure config
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            allurerc.mjs

      - name: Download test results
        uses: actions/download-artifact@v4
        with:
          path: allure-results
          pattern: AllureResults-*
          merge-multiple: true

      - name: Generate Allure report
        run: npx allure generate ./allure-results

      - name: Upload Allure report
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./allure-report

      - name: Deploy Allure report to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
